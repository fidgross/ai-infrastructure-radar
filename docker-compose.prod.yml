services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: radar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d radar"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: deploy/docker/backend.prod.Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/radar}
      PYTHONPATH: /app/backend
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-["http://localhost"]}
      BACKEND_TRUSTED_HOSTS: ${BACKEND_TRUSTED_HOSTS:-["localhost","127.0.0.1","testserver","backend"]}
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips='*'"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/api/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20

  frontend:
    build:
      context: .
      dockerfile: deploy/docker/frontend.prod.Dockerfile
    environment:
      INTERNAL_API_URL: http://backend:8000
      NEXT_PUBLIC_API_URL: ${PUBLIC_BASE_URL:-http://localhost}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20

  pipeline:
    build:
      context: .
      dockerfile: deploy/docker/backend.prod.Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/radar}
      PYTHONPATH: /app/backend
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-["http://localhost"]}
      BACKEND_TRUSTED_HOSTS: ${BACKEND_TRUSTED_HOSTS:-["localhost","127.0.0.1","testserver","backend"]}
    depends_on:
      backend:
        condition: service_healthy
    command: >
      sh -c "while true; do
      python /app/scripts/run_pipeline.py --manifest /app/config/source_manifest.json;
      sleep 21600;
      done"
    restart: unless-stopped

  caddy:
    image: caddy:2.8-alpine
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-http://localhost, http://127.0.0.1}
    restart: unless-stopped
    volumes:
      - ./deploy/caddy/docker.Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_prod_data:
  caddy_data:
  caddy_config:
